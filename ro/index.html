<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMR Main Hub</title>
    <style>
        /* 📜 استدعاء خطوط تاريخية وعريقة؛ خط "Amiri" القرآني التاريخي وخط "Cairo" للملمس الفخم */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&family=Poppins:wght@400;600;800&display=swap');
        
        :root {
            --cyan: #00d2ff;
            --blue: #0066ff;
            --dark-blue: #e5e6e6;
            --warn: #ff3c00;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 🏛️ تطبيق الخط التاريخي الأثري */
            font-family: 'Cairo', 'Poppins', sans-serif;
            user-select: none;
        }

        body {
            background: #b3e0ff;
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
            position: relative;
        }

        /* 🌑 خلفية داكنة احترافية: موجات نيون + ضباب سيبراني متحرك */
        .water-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 210, 255, 0.18), transparent 35%),
                radial-gradient(circle at 80% 70%, rgba(0, 102, 255, 0.22), transparent 40%),
                linear-gradient(135deg, #020617, #050b1f, #00152e, #020617);
            background-size: 140% 140%;
            animation: darkFlow 9s ease-in-out infinite;
            z-index: -2;
        }

        .water-bg::before,
        .water-bg::after {
            content: "";
            position: absolute;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(70px);
            opacity: .35;
            animation: orbMove 8s ease-in-out infinite alternate;
        }

        .water-bg::before {
            background: radial-gradient(circle, #00d2ff, transparent 65%);
            top: -25%;
            left: -15%;
        }

        .water-bg::after {
            background: radial-gradient(circle, #0066ff, transparent 65%);
            bottom: -30%;
            right: -15%;
            animation-delay: -5s;
        }

        @keyframes darkFlow {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes orbMove {
            from { transform: translate(0,0) scale(1); }
            to { transform: translate(80px,-50px) scale(1.15); }
        }

        /* خطوط ضوئية متحركة */
        .water-bg::marker { display:none; }

        body.page-exit { opacity: 0; }

        /* Stronger page transitions and entry animation */
        body.page-exit { opacity: 0; transform: translateY(8px) scale(0.998); transition: opacity 0.42s ease, transform 0.42s ease; }
        main.page-enter { animation: contentIn 480ms cubic-bezier(0.22,1,0.36,1) forwards; }
        @keyframes contentIn {
            from { opacity: 0; transform: translateY(20px) scale(0.996); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Text movement (entrance) */
        .text-move { display: inline-block; transform-origin: center; animation: textFloat 760ms cubic-bezier(0.2,1,0.3,1) both; }
        @keyframes textFloat {
            0% { opacity: 0; transform: translateY(18px) translateX(0) scale(0.995); }
            60% { opacity: 1; transform: translateY(-6px) translateX(0) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) translateX(0) scale(1); }
        }

        /* Strong, clear glow for important text */
        .strong-glow {
            text-shadow: 0 8px 44px rgba(0,160,255,0.42), 0 0 72px rgba(138,85,255,0.22), 0 2px 6px rgba(0,0,0,0.45);
            filter: drop-shadow(0 10px 50px rgba(0,160,255,0.16));
            transition: text-shadow 0.45s ease, filter 0.45s ease;
            will-change: text-shadow, transform;
        }

        @keyframes strongPulse {
            0% { text-shadow: 0 6px 26px rgba(0,160,255,0.28); transform: translateY(0); }
            50% { text-shadow: 0 12px 48px rgba(0,160,255,0.46), 0 0 80px rgba(138,85,255,0.28); transform: translateY(-3px); }
            100% { text-shadow: 0 6px 26px rgba(0,160,255,0.28); transform: translateY(0); }
        }
        .strong-glow.pulsing { animation: strongPulse 4.2s ease-in-out infinite; }

        /* Mouse ripple effect removed; background remains */

        /* شريط التنقل العلوي التاريخي */
        .navbar {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 980px;
            background: rgba(6,12,28,0.7);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 999px;
            padding: 12px 18px;
            display: flex;
            justify-content: center;
            gap: 18px;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 18px 60px rgba(2,6,23,0.55);
            animation: slideDown 0.9s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.12s;
        }

        @keyframes slideDown { to { top: 0; } }

        .nav-btn {
            background: transparent;
            border: none;
            color: #dff4ff;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 999px;
            transition: all 0.28s ease;
            letter-spacing: .6px;
        }

        .nav-btn:hover {
            color: var(--blue);
            transform: translateY(-2px);
            text-shadow: 0 0 10px rgba(0, 102, 255, 0.2);
        }

        .nav-btn.active-ai {
            color: #fff;
            background: linear-gradient(90deg, #6fd3ff 0%, #7a6bff 60%);
            border-radius: 999px;
            padding: 8px 26px;
            box-shadow: 0 10px 30px rgba(122,107,255,0.22), inset 0 -6px 18px rgba(255,255,255,0.03);
        }

        /* زر كتم الصوت */
        .mute-toggle {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 102, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 5px 15px rgba(0, 51, 102, 0.1);
            transition: all 0.3s ease;
        }
        .mute-toggle:hover { transform: scale(1.05); border-color: var(--blue); }
        .mute-toggle svg { width: 22px; height: 22px; fill: var(--text-color); }
        .mute-toggle.muted svg { fill: var(--warn); }

        /* Hub Container */
        .hub-container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            max-width: 1000px;
            width: 100%;
            margin-top: 140px;
            margin-bottom: 40px;
            /* leave extra bottom padding so fixed CTA doesn't cover content and page can scroll */
            padding-bottom: 220px;
        }

        .title-glow {
            font-size: 5rem;
            font-weight: 900;
            font-family: 'Cairo', sans-serif;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--dark-blue), var(--blue), var(--cyan), var(--dark-blue));
            background-size: 300% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 6s linear infinite;
            margin-bottom: 5px;
            filter: drop-shadow(0 4px 10px rgba(248, 248, 249, 0.2));
        }

        @keyframes shineText { to { background-position: 300% center; } }

        .subtitle {
            font-size: 1.6rem;
            color: var(--blue);
            font-style: italic;
            margin-bottom: 40px;
            font-weight: 700;
        }

        /* الكروت الزجاجية العريقة */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            width: 100%;
            padding: 10px;
        }

        .hub-card {
            background: rgba(255, 255, 255, 0.65);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 40px 30px;
            text-decoration: none;
            color: var(--text-color);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0, 51, 102, 0.06);
        }

        .hub-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 20px 40px rgba(0, 102, 255, 0.15);
        }
        
        .hub-card.card-pc:hover { border-color: var(--cyan); }
        .hub-card.card-android:hover { border-color: #24b662; }
        .hub-card.card-iphone:hover { border-color: var(--blue); }

        .card-icon { width: 68px; height: 68px; margin-bottom: 18px; transition: transform 0.35s; }
        .hub-card:hover .card-icon { transform: scale(1.12); }
        .card-title { font-size: 1.9rem; font-weight: 800; font-family: 'Cairo', sans-serif; color: #eaf6ff; }

        .hub-card { border-radius: 18px; padding: 34px 28px; background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); box-shadow: 0 20px 60px rgba(2,10,30,0.6); border: 1px solid rgba(255,255,255,0.02); min-height: 200px; display:flex; flex-direction:column; align-items:center; justify-content:center; }

        /* تاقات الحالة */
        .status-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 0.78rem;
            font-weight: 800;
            padding: 6px 10px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.04);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 18px rgba(2,6,23,0.45);
        }
        .status-tag[data-type="undetected"] { color: #24b662; }
        .status-tag[data-type="updating"] { color: #e6a100; }

        /* replace small dot with compact Discord glyph */
        .status-dot {
            width: 18px;
            height: 18px;
            display: inline-block;
            line-height: 0;
            transition: transform 0.22s ease, filter 0.22s ease;
            flex: 0 0 18px;
        }
        .status-dot svg { width: 100%; height: 100%; display: block; border-radius:4px }

        /* adjust color/state by tinting the SVG via filter when needed */
        .status-tag[data-type="undetected"] .status-dot svg { filter: drop-shadow(0 0 8px rgba(36,182,98,0.45)); }
        .status-tag[data-type="updating"] .status-dot svg { filter: drop-shadow(0 0 8px rgba(230,161,0,0.35)); }

        .status-dot.active { transform: scale(1.06); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.45); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* RTL support: move dot to left when RTL */
        [dir="rtl"] .status-tag { flex-direction: row-reverse; }

        /* add a small square indicator before the text to match screenshot */
        .status-tag::before { content: ''; width: 8px; height: 8px; border-radius: 3px; display: inline-block; margin-right: 6px; }
        [dir="rtl"] .status-tag::before { margin-left:6px; margin-right:0 }
        .status-tag[data-type="undetected"]::before { background: #24b662; box-shadow: 0 0 8px rgba(36,182,98,0.35); }
        .status-tag[data-type="updating"]::before { background: #e6a100; box-shadow: 0 0 8px rgba(230,161,0,0.25); }

        /* الإحصائيات التاريخية */
        .stats-container { display: flex; justify-content: center; gap: 80px; margin-top: 60px; flex-wrap: wrap; }
        .stat-item { display: flex; flex-direction: column; align-items: center; min-width: 160px; }
        .stat-number { font-size: 3.8rem; font-weight: 900; color: var(--blue); font-family: 'Cairo', sans-serif; line-height: 1; margin-bottom: 6px; }
        /* make discord count more prominent */
        #discordCount { font-size: 5.6rem; color: #5865F2; text-shadow: 0 6px 26px rgba(88,101,242,0.18); }
        /* make labels more readable against dark background and ensure visible */
        .stat-label { font-size: 1.05rem; color: rgba(234,245,255,0.96); font-weight: 800; text-align: center; margin-top: 6px; }

        /* الأزرار العائمة */
        .discord-float, .chat-page-redirect {
            position: fixed;
            bottom: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: all 0.3s ease;
        }
        .discord-float { right: 30px; background: #5865F2; box-shadow: 0 5px 15px rgba(88, 101, 242, 0.3); }
        .discord-float:hover { transform: scale(1.1) rotate(360deg); }
        .discord-float svg { width: 32px; height: 32px; fill: #fff; }

        .chat-page-redirect { right: 105px; background: linear-gradient(135deg, var(--cyan), var(--blue)); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }
        .chat-page-redirect:hover { transform: scale(1.1) translateY(-3px); }
        .chat-page-redirect svg { width: 28px; height: 28px; fill: #fff; }

        /* Big CTA removed per user request */

        /* Animated subtle glow for key texts */
        @keyframes textPulse {
            0% { text-shadow: 0 4px 20px rgba(0,0,0,0.25); transform: translateY(0); }
            50% { text-shadow: 0 8px 30px rgba(100,160,255,0.18); transform: translateY(-4px); }
            100% { text-shadow: 0 4px 20px rgba(0,0,0,0.25); transform: translateY(0); }
        }

        .glow-animate { animation: textPulse 3.4s ease-in-out infinite; }
        .title-glow.glow-animate { animation-duration: 6s; }

        /* Professional site-wide text glow animation */
        :root { --glow-main: 100,160,255; --glow-accent: 138,85,255; }

        @keyframes proGlow {
            0% {
                text-shadow: 0 6px 18px rgba(0,0,0,0.25), 0 0 0 rgba(var(--glow-main),0);
                transform: translateY(0);
                opacity: 1;
            }
            40% {
                text-shadow: 0 12px 36px rgba(8,24,60,0.14), 0 0 22px rgba(var(--glow-main),0.14), 0 0 8px rgba(var(--glow-accent),0.06);
                transform: translateY(-4px);
                opacity: 1;
            }
            70% {
                text-shadow: 0 10px 26px rgba(8,24,60,0.10), 0 0 28px rgba(var(--glow-main),0.18);
                transform: translateY(-1px);
            }
            100% {
                text-shadow: 0 6px 18px rgba(0,0,0,0.25), 0 0 0 rgba(var(--glow-main),0);
                transform: translateY(0);
            }
        }

        /* apply the professional glow to primary text elements */
        .title-glow,
        .subtitle,
        .navbar .nav-btn,
        .card-title,
        .stat-number,
        .stat-label,
        .status-text,
        .status-tag,
        .chat-page-redirect,
        .discord-float {
            animation: proGlow 4.6s ease-in-out infinite;
            will-change: transform, text-shadow;
        }

        /* subtle variants */
        .stat-number { animation-duration: 5.8s; }
        .title-glow { animation-duration: 6.6s; }
        .navbar .nav-btn { animation-duration: 5.2s; }

        /* reduce motion for prefers-reduced-motion */
        @media (prefers-reduced-motion: reduce) {
            .title-glow, .subtitle, .card-title, .stat-number, .navbar .nav-btn { animation: none; }
        }
        .card-title.glow-animate, .stat-number.glow-animate, .big-cta-title.glow-animate { text-shadow: 0 8px 28px rgba(45,140,255,0.18); }

        

        @media (max-width: 768px) {
            .title-glow { font-size: 3.2rem; }
            .subtitle { font-size: 1.2rem; }
            .navbar { width: 95%; }
            .stats-container { gap: 30px; }
            .stat-number { font-size: 2.8rem; }
            .chat-page-redirect { right: 85px; }
        }

 position:fixed; top:25px; right:25px; z-index:2000;

 transition:.3s;

</style>
</head>

<button class="lang-switch" id="langSwitch">English 🌐</button>


    <!-- الخلفية المائية المتحركة تلقائياً وبنعومة -->
    <div class="water-bg"></div>

                    <svg viewBox="0 0 245 240" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path fill="#FFFFFF" d="M104.4 104.7c-5.7-1-10.4-2.1-14.9-3.3 0 0-0.1-0.1-0.1-0.2 5.5-1.6 10.8-3 15.6-4.1 5.1-1.2 9.4-2 13.2-2.5 0 0 0 0 0 0 3.8 0.5 8 1.3 13.1 2.5 4.8 1.1 10.1 2.5 15.6 4.1 -0.1 0.1-0.1 0.2-0.1 0.2 -4.5 1.2-9.2 2.3-14.9 3.3 -7 1.3-13 1.9-18.8 1.9 -5.7 0-11.7-0.6-18.8-1.9z"/>
                        <path fill="#5865F2" d="M189.5 20H55.5C48 20 42 26 42 33.6v134.8c0 7.6 6 13.6 13.5 13.6h92.8l5.2 12.6 5.2-12.6h18.8c7.5 0 13.5-6 13.5-13.6V33.6c0-7.6-6-13.6-13.5-13.6z"/>

                </span><span class="status-text">LOADING</span></span>
                <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#24b662" stroke-width="1.5">

    <!-- Spacer to allow scrolling further down the page -->
    <div class="page-spacer" style="height:600px; width:100%;"></div>

    <!-- Big fixed bottom CTA (matches provided design) -->

    <script>
        const SYSTEM_CONFIG = {
            status: {
                pc: { text: "آمن وغير مكشوف", type: "undetected" },     
                android: { text: "تحت التحديث", type: "updating" },
                iphone: { text: "يعمل الآن", type: "undetected" }
            },
            stats: { team: "9", discord: "+228", version: "2" }
        };

        function applyStatusToElement(el, statusObj){
            if (!el) return;
            const textEl = el.querySelector('.status-text');
            const dotEl = el.querySelector('.status-dot');
            if (textEl && statusObj.text) textEl.textContent = statusObj.text;
            if (statusObj.type) el.setAttribute('data-type', statusObj.type);
            if (dotEl) {
                // active for undetected, updating and 'working'
                const activeTypes = ['undetected','updating','working'];
                if (activeTypes.includes(statusObj.type)) dotEl.classList.add('active');
                else dotEl.classList.remove('active');
            }
        }

        applyStatusToElement(document.getElementById('status-pc'), SYSTEM_CONFIG.status.pc);
        applyStatusToElement(document.getElementById('status-android'), SYSTEM_CONFIG.status.android);
        applyStatusToElement(document.getElementById('status-iphone'), SYSTEM_CONFIG.status.iphone);

        const teamCountEl = document.getElementById('teamCount');
        if (teamCountEl) teamCountEl.textContent = SYSTEM_CONFIG.stats.team;
        const discordCountEl = document.getElementById('discordCount');
        if (discordCountEl) discordCountEl.textContent = SYSTEM_CONFIG.stats.discord;
        const versionCountEl = document.getElementById('versionCount');
        if (versionCountEl) versionCountEl.textContent = SYSTEM_CONFIG.stats.version;

        // Mouse ripple listeners removed — only background animations remain

        // تشغيل الأصوات الت\فاعلية السيبرانية
        let isMuted = localStorage.getItem('mmr-muted') === '1';
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playCyberSound(frequency, duration, type = 'sine') {
            if (isMuted) return;
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const muteBtn = document.getElementById('muteBtn');
        // initialize mute button visual from localStorage
        if (isMuted) {
            muteBtn.classList.add('muted');
            muteBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';
        } else {
            muteBtn.classList.remove('muted');
            muteBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
        }
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            localStorage.setItem('mmr-muted', isMuted ? '1' : '0');
            if (isMuted) {
                muteBtn.classList.add('muted');
                muteBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';
            } else {
                muteBtn.classList.remove('muted');
                muteBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
                playCyberSound(600, 0.1);
            }
        });

        function attachInteractionListeners(){
            document.querySelectorAll('.hub-card, .nav-btn, .discord-float, .chat-page-redirect').forEach(el => {
                el.addEventListener('mouseenter', () => playCyberSound(1000, 0.02, 'sine'));
                el.addEventListener('click', () => playCyberSound(600, 0.1, 'triangle'));
            });
        }
        attachInteractionListeners();

        // SPA-style loader: fetch page and replace <main> content without full reload
        function updateActiveNav(targetUrl){
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-ai'));
            const match = Array.from(document.querySelectorAll('.nav-btn')).find(b => (b.getAttribute('href')||b.getAttribute('data-href'))===targetUrl);
            if (match) match.classList.add('active-ai');
        }

        function attachClassLinkDelegation(){
            document.body.addEventListener('click', (e) => {
                const a = e.target.closest('.class-link');
                if (!a) return;
                const targetUrl = a.getAttribute('href') || a.getAttribute('data-href');
                if (!targetUrl) return;
                // allow external links to work as normal
                if (targetUrl.startsWith('http')) return;
                e.preventDefault();
                loadPage(targetUrl);
            });
        }

        function initPageAfterLoad(){
            attachInteractionListeners();
            attachStatusTagListeners();
            // reapply language texts so localized labels update on injected content
            setLanguage(localStorage.getItem("mmr-language") || document.documentElement.lang || 'ar');
            // initial entrance animation for elements already on the page
            const mainElInit = document.querySelector('main') || document.querySelector('.hub-container');
            if (mainElInit) {
                mainElInit.classList.add('page-enter');
                void mainElInit.offsetWidth;
                const animatedElsInit = mainElInit.querySelectorAll('.title-glow, .subtitle, .card-title, .stat-number, .stat-label, .status-tag');
                animatedElsInit.forEach((el, idx) => {
                    el.classList.add('text-move','strong-glow');
                    el.style.animationDelay = (idx * 70) + 'ms';
                    setTimeout(() => { el.classList.remove('text-move'); el.style.animationDelay = ''; }, 1000 + idx * 70);
                });
                setTimeout(()=> { mainElInit.classList.remove('page-enter'); }, 700);
                setTimeout(()=> { animatedElsInit.forEach(el => el.classList.add('pulsing')); }, 1100);
                setTimeout(()=> { animatedElsInit.forEach(el => el.classList.remove('pulsing')); }, 4700);
            }
        }

        function loadPage(targetUrl, options = { push: true }){
            if (!targetUrl) return;
            document.body.classList.add('page-exit');
            fetch(targetUrl).then(r => r.text()).then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newMain = doc.querySelector('main') || doc.querySelector('.hub-container');
                const newTitle = doc.title || (newMain && newMain.querySelector('.title-glow') ? newMain.querySelector('.title-glow').textContent.trim() : document.title);
                setTimeout(() => {
                    if (!newMain) {
                        // fallback to full navigation
                        window.location.href = targetUrl;
                        return;
                    }
                    const currentMain = document.querySelector('main');
                    if (currentMain) currentMain.innerHTML = newMain.innerHTML;
                    document.title = newTitle;
                    // animate entry: add page-enter to main and apply text move + strong glow
                    const mainEl = document.querySelector('main') || document.querySelector('.hub-container');
                    if (mainEl) {
                        mainEl.classList.add('page-enter');
                        void mainEl.offsetWidth; // force reflow for animation
                        const animatedEls = mainEl.querySelectorAll('.title-glow, .subtitle, .card-title, .stat-number, .stat-label, .status-tag');
                        animatedEls.forEach((el, idx) => {
                            el.classList.add('text-move', 'strong-glow');
                            el.style.animationDelay = (idx * 80) + 'ms';
                            setTimeout(() => { el.classList.remove('text-move'); el.style.animationDelay = ''; }, 1100 + idx * 80);
                        });
                        setTimeout(()=> { mainEl.classList.remove('page-enter'); }, 700);
                        // add longer pulsing glow for a while then settle
                        setTimeout(()=> { animatedEls.forEach(el => el.classList.add('pulsing')); }, 1200);
                        setTimeout(()=> { animatedEls.forEach(el => el.classList.remove('pulsing')); }, 5200);
                    }
                    // copy html lang/dir if available
                    if (doc.documentElement.lang) document.documentElement.lang = doc.documentElement.lang;
                    if (doc.documentElement.dir) document.documentElement.dir = doc.documentElement.dir;
                    updateActiveNav(targetUrl);
                    if (options.push) history.pushState({spa:true, url: targetUrl}, '', targetUrl);
                    initPageAfterLoad();
                    document.body.classList.remove('page-exit');
                }, 380);
            }).catch(() => { window.location.href = targetUrl; });
        }

        // handle back/forward
        window.addEventListener('popstate', (e) => {
            const url = location.pathname.split('/').pop() || 'index.html';
            loadPage(url, { push: false });
        });

        attachClassLinkDelegation();

        const activeUsersEl = document.getElementById('activeUsers');
        let currentUsers = Math.floor(Math.random() * (450 - 200 + 1)) + 200;
        activeUsersEl.textContent = currentUsers;

        setInterval(() => {
            const change = Math.floor(Math.random() * 9) - 4; 
            currentUsers = Math.max(150, Math.min(500, currentUsers + change));
            activeUsersEl.textContent = currentUsers;
        }, 2500);

        // Allow clicking status tags to toggle dot on/off (visual only)
        function attachStatusTagListeners(){
            document.querySelectorAll('.status-tag').forEach(tag => {
                tag.style.cursor = 'pointer';
                tag.addEventListener('click', () => {
                    const dot = tag.querySelector('.status-dot');
                    if (!dot) return;
                    dot.classList.toggle('active');
                    if (!dot.classList.contains('active')) {
                        tag.style.opacity = '0.6';
                        tag.setAttribute('data-off','true');
                    } else {
                        tag.style.opacity = '1';
                        tag.removeAttribute('data-off');
                    }
                });
            });
        }
        attachStatusTagListeners();

        function setLanguage(lang){
            const d = LANG_DATA[lang];
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
            document.title = d.title;
            document.querySelector(".subtitle").textContent = d.subtitle;
            document.querySelector(".title-glow").textContent = d.title;
            document.getElementById("langSwitch").textContent = d.langBtn;

            document.querySelectorAll(".navbar .nav-btn").forEach((el,i)=>{
                if (d.nav[i]) el.textContent = d.nav[i];
            });

            document.querySelectorAll(".card-title").forEach((el,i)=>{
                if (d.cards[i]) el.textContent = d.cards[i];
            });
            document.querySelectorAll(".stat-label").forEach((el,i)=>{
                if (d.stats[i]) el.textContent = d.stats[i];
            });

            if (d.status) {
                if (d.status.pc) applyStatusToElement(document.getElementById('status-pc'), { text: d.status.pc });
                if (d.status.android) applyStatusToElement(document.getElementById('status-android'), { text: d.status.android });
                if (d.status.iphone) applyStatusToElement(document.getElementById('status-iphone'), { text: d.status.iphone });
            }

            // apply glow class to key UI texts for a professional animated look
            document.querySelectorAll('.card-title, .stat-number, .title-glow').forEach(el => el.classList.add('glow-animate'));

            // Update tooltips / titles for interactive elements
            if (d.muteTitle) muteBtn.setAttribute('title', d.muteTitle);
            const chatEl = document.querySelector('.chat-page-redirect');
            if (chatEl && d.chatTitle) chatEl.setAttribute('title', d.chatTitle);

            localStorage.setItem("mmr-language", lang);
        }

        document.getElementById("langSwitch").addEventListener("click",()=>{
            const current=document.documentElement.lang==="ar" ? "en" : "ar";
            setLanguage(current);
        });

        setLanguage(localStorage.getItem("mmr-language") || "ar");

        // Respond to postMessage requests from AI page to provide structured page data
        window.addEventListener('message', (event) => {
            try {
                const msg = event.data || {};
                if (msg && msg.type === 'request_page_data') {
                    const pageData = {
                        title: document.querySelector('.title-glow') ? document.querySelector('.title-glow').textContent.trim() : document.title,
                        subtitle: document.querySelector('.subtitle') ? document.querySelector('.subtitle').textContent.trim() : '',
                        nav: Array.from(document.querySelectorAll('.navbar .nav-btn')).map(n => n.textContent.trim()),
                        cards: Array.from(document.querySelectorAll('.card-title')).map(c => c.textContent.trim()),
                        statuses: {
                            pc: (document.getElementById('status-pc') && document.getElementById('status-pc').querySelector('.status-text')) ? document.getElementById('status-pc').querySelector('.status-text').textContent.trim() : '',
                            android: (document.getElementById('status-android') && document.getElementById('status-android').querySelector('.status-text')) ? document.getElementById('status-android').querySelector('.status-text').textContent.trim() : '',
                            iphone: (document.getElementById('status-iphone') && document.getElementById('status-iphone').querySelector('.status-text')) ? document.getElementById('status-iphone').querySelector('.status-text').textContent.trim() : ''
                        },
                        stats: Array.from(document.querySelectorAll('.stat-item .stat-number')).map(s => s.textContent.trim())
                    };
                    // send data back
                    (event.source || window).postMessage({ type: 'page_data', data: pageData }, '*');
                }
            } catch (e) { /* ignore */ }
        });

</script>
